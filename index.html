<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />

  <title>ბებოს სამზარეულო</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans Georgian', sans-serif;
      background: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 60px;
      gap: 32px;
    }

    header {
      text-align: center;
    }
    header h1 {
      font-size: clamp(1.8rem, 6vw, 2.8rem);
      font-weight: 900;
      color: #1a1a1a;
      letter-spacing: -0.5px;
    }
    header p {
      margin-top: 6px;
      color: #aaa;
      font-weight: 300;
      font-size: clamp(0.85rem, 3vw, 1rem);
    }

    @keyframes popIn {
      0%   { opacity: 0; transform: scale(0.75); }
      65%  { transform: scale(1.06); }
      100% { opacity: 1; transform: scale(1); }
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 20px;
      width: 100%;
      max-width: 900px;
    }

    .item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      animation: popIn 0.5s ease both;
    }
    .item:nth-child(1)  { animation-delay: 0.05s; }
    .item:nth-child(2)  { animation-delay: 0.10s; }
    .item:nth-child(3)  { animation-delay: 0.15s; }
    .item:nth-child(4)  { animation-delay: 0.20s; }
    .item:nth-child(5)  { animation-delay: 0.25s; }
    .item:nth-child(6)  { animation-delay: 0.30s; }
    .item:nth-child(7)  { animation-delay: 0.35s; }
    .item:nth-child(8)  { animation-delay: 0.40s; }
    .item:nth-child(9)  { animation-delay: 0.45s; }
    .item:nth-child(10) { animation-delay: 0.50s; }

    .item-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 16px;
      border: 2px solid #e0e0e0;
      overflow: hidden;
      background: #fff;
      transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), box-shadow 0.18s;
    }
    .item:hover .item-img {
      transform: scale(1.07) translateY(-4px);
      box-shadow: 0 14px 32px rgba(0,0,0,0.13);
    }
    .item:active .item-img {
      transform: scale(0.95);
    }
    .item-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .item-label {
      text-align: center;
    }
    .item-num {
      font-size: clamp(0.55rem, 1.5vw, 0.68rem);
      letter-spacing: 2px;
      color: #bbb;
      font-weight: 600;
    }
    .item-name {
      font-size: clamp(0.75rem, 2vw, 0.92rem);
      font-weight: 700;
      color: #1a1a1a;
      margin-top: 2px;
      line-height: 1.3;
    }

    /* tablet: 2 rows of 5 stays but tighter */
    @media (max-width: 700px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
        max-width: 400px;
        gap: 18px;
      }
      .item-img {
        border-radius: 14px;
      }
    }

    /* large phones: 2 columns */
    @media (max-width: 400px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 14px;
      }
    }
  </style>
</head>
<body>
