  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>სამზარეულო</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans Georgian', sans-serif;
      background: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      gap: 24px;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 900;
      color: #1a1a1a;
    }

    @keyframes popIn {
      0%   { opacity: 0; transform: scale(0.75); }
      65%  { transform: scale(1.06); }
      100% { opacity: 1; transform: scale(1); }
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 160px);
      grid-template-rows: repeat(2, auto);
      gap: 24px 20px;
    }

    /* each cell: image on top, text below */
    .item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      animation: popIn 0.5s ease both;
      text-decoration: none;
    }
    .item:nth-child(1)  { animation-delay: 0.05s; }
    .item:nth-child(2)  { animation-delay: 0.10s; }
    .item:nth-child(3)  { animation-delay: 0.15s; }
    .item:nth-child(4)  { animation-delay: 0.20s; }
    .item:nth-child(5)  { animation-delay: 0.25s; }
    .item:nth-child(6)  { animation-delay: 0.30s; }
    .item:nth-child(7)  { animation-delay: 0.35s; }
    .item:nth-child(8)  { animation-delay: 0.40s; }
    .item:nth-child(9)  { animation-delay: 0.45s; }
    .item:nth-child(10) { animation-delay: 0.50s; }

    .item-img {
      width: 160px;
      height: 160px;
      border-radius: 16px;
      border: 2px solid #e0e0e0;
      overflow: hidden;
      background: #fff;
      transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), box-shadow 0.18s;
    }
    .item:hover .item-img {
      transform: scale(1.08) translateY(-4px);
      box-shadow: 0 16px 36px rgba(0,0,0,0.13);
    }
    .item:active .item-img {
      transform: scale(0.96);
    }
    .item-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* text OUTSIDE the image, below */
    .item-label {
      text-align: center;
      color: #1a1a1a;
    }
    .item-num {
      font-size: 0.65rem;
      letter-spacing: 2px;
      color: #bbb;
      font-weight: 600;
    }
    .item-name {
      font-size: 0.9rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-top: 2px;
    }
  </style>
</head>
